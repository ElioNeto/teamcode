name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

env:
  OPENCODE_VERSION: ${{ inputs.version || '' }}

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.repository == 'ElioNeto/teamcode'
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          teamcode-app-id: ${{ vars.TEAMCODE_APP_ID }}
          teamcode-app-secret: ${{ secrets.TEAMCODE_APP_SECRET }}

      # ── Determine version ──────────────────────────────────────
      - id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ -n "${{ inputs.bump }}" ]]; then
            ./script/version.ts
            exit 0
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "No version input or tag provided"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=true" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
          OPENCODE_BUMP: ${{ inputs.bump }}
          OPENCODE_VERSION: ${{ inputs.version }}
          OPENCODE_RELEASE: true

      # ── Build CLI binary ───────────────────────────────────────
      - name: Build CLI
        id: build
        continue-on-error: true
        run: |
          ./packages/teamcode/script/build.ts ${{ (startsWith(github.ref_name, 'v') && contains(github.ref_name, '-') && '--sourcemaps') || '' }}
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_RELEASE: ${{ steps.version.outputs.release }}
          GH_TOKEN: ${{ steps.committer.outputs.token }}

      # ── Publish to npm, Docker, AUR, Homebrew ──────────────────
      - name: Publish
        run: ./script/publish.ts
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_RELEASE: ${{ steps.version.outputs.release }}
          GITHUB_TOKEN: ${{ steps.committer.outputs.token }}
          GH_REPO: ${{ github.repository }}
          NPM_CONFIG_PROVENANCE: false
