name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Override version"
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.repository == 'ElioNeto/teamcode'
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/setup-bun
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git user
        run: |
          git config --global user.name "teamcode-bot"
          git config --global user.email "teamcode-bot@users.noreply.github.com"

      # ── Version ──────────────────────────────────────────────
      - id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            exit 1
          fi
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "release=true" >> $GITHUB_OUTPUT
        env:
          VERSION: ${{ inputs.version || '' }}

      # ── Build CLI binary ───────────────────────────────────────
      - name: Build CLI
        run: |
          ./packages/teamcode/script/build.ts
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_RELEASE: true
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      # ── Publish @teamcode-ai/* packages to npm ──────────────
      - name: Publish npm packages
        run: ./script/publish.ts
        env:
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
          OPENCODE_RELEASE: true
          OPENCODE_CHANNEL: latest
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      # ── Publish VS Code extension ────────────────────────────
      - name: Publish VS Code extension
        continue-on-error: true
        working-directory: sdks/vscode
        run: |
          bun run package
          npx vsce publish --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
