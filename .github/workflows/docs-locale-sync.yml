name: docs-locale-sync

on:
  push:
    branches:
      - dev
    paths:
      - "packages/web/src/content/docs/**"
      - "README.md"
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'teamcode/teamcode'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          teamcode-app-id: ${{ vars.TEAMCODE_APP_ID }}
          teamcode-app-secret: ${{ secrets.TEAMCODE_APP_SECRET }}

      - name: Install teamcode
        run: curl -fsSL https://teamcode.ai/install | bash

      - name: Sync locale docs with teamcode
        env:
          TEAMCODE_API_KEY: ${{ secrets.TEAMCODE_API_KEY }}
          TEAMCODE_CONFIG_CONTENT: |
            {
              "agent": {
                "translator": {
                  "model": "anthropic/claude-sonnet-4-6",
                  "mode": "subagent"
                }
              }
            }
        run: |
          teamcode run --agent docs --model teamcode/gpt-5.3-codex <<'EOF'
          You are a documentation maintainer.

          There is a set of locale-specific README translations in the root directory.
          Read the English README.md, then update all README.*.md translations to match
          the English version. Use the .opencode/agent/translator.md agent for translations
          (but do NOT use the task tool to invoke it, just write the files directly).

          Maintain the same structure and formatting as the English version.
          Keep existing locale files if they exist, just update their content to match.
          </teamcode>
